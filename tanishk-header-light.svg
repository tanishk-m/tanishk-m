<svg width="100%" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0ff"/>
      <stop offset="45%" style="stop-color:#ede9fe"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e0050"/>
      <stop offset="50%" style="stop-color:#4c1d95"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bgGrad)"/>

  <!-- Decorative grid lines -->
  <line x1="0" y1="60" x2="900" y2="60" stroke="#7c3aed" stroke-width="0.3" opacity="0.2"/>
  <line x1="0" y1="220" x2="900" y2="220" stroke="#7c3aed" stroke-width="0.3" opacity="0.2"/>
  <line x1="150" y1="0" x2="150" y2="280" stroke="#7c3aed" stroke-width="0.3" opacity="0.1"/>
  <line x1="750" y1="0" x2="750" y2="280" stroke="#7c3aed" stroke-width="0.3" opacity="0.1"/>

  <!-- Decorative circles -->
  <circle cx="60" cy="60" r="40" fill="none" stroke="#7c3aed" stroke-width="0.8" opacity="0.3"/>
  <circle cx="60" cy="60" r="25" fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.2"/>
  <circle cx="840" cy="220" r="40" fill="none" stroke="#7c3aed" stroke-width="0.8" opacity="0.3"/>
  <circle cx="840" cy="220" r="25" fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.2"/>
  <circle cx="840" cy="60" r="20" fill="none" stroke="#4c1d95" stroke-width="0.5" opacity="0.2"/>
  <circle cx="60" cy="220" r="20" fill="none" stroke="#4c1d95" stroke-width="0.5" opacity="0.2"/>

  <!-- Glowing dots -->
  <circle cx="200" cy="40" r="2" fill="#7c3aed" opacity="0.5"/>
  <circle cx="450" cy="25" r="1.5" fill="#4c1d95" opacity="0.4"/>
  <circle cx="700" cy="40" r="2" fill="#7c3aed" opacity="0.5"/>
  <circle cx="300" cy="250" r="1.5" fill="#4c1d95" opacity="0.3"/>
  <circle cx="600" cy="255" r="2" fill="#7c3aed" opacity="0.4"/>

  <!-- Neural net decorative dots top-right -->
  <circle cx="820" cy="30" r="3" fill="#7c3aed" opacity="0.4"/>
  <circle cx="860" cy="50" r="2" fill="#4c1d95" opacity="0.3"/>
  <circle cx="800" cy="55" r="2" fill="#7c3aed" opacity="0.3"/>
  <line x1="820" y1="30" x2="860" y2="50" stroke="#7c3aed" stroke-width="0.5" opacity="0.2"/>
  <line x1="820" y1="30" x2="800" y2="55" stroke="#7c3aed" stroke-width="0.5" opacity="0.2"/>
  <line x1="860" y1="50" x2="800" y2="55" stroke="#7c3aed" stroke-width="0.5" opacity="0.2"/>

  <!-- Wave bottom -->
  <path d="M0,240 C150,210 300,260 450,240 C600,220 750,255 900,235 L900,280 L0,280 Z" fill="#ede9fe" opacity="0.6"/>

  <!-- Name -->
  <text
    x="450"
    y="138"
    font-family="'Segoe UI', 'Arial Black', 'Helvetica Neue', sans-serif"
    font-size="52"
    font-weight="900"
    text-anchor="middle"
    fill="url(#textGrad)"
    filter="url(#glow)"
    letter-spacing="4"
  >TANISHK MEENA</text>

  <!-- Divider line -->
  <line x1="300" y1="158" x2="600" y2="158" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
  <circle cx="300" cy="158" r="2" fill="#7c3aed" opacity="0.7"/>
  <circle cx="600" cy="158" r="2" fill="#7c3aed" opacity="0.7"/>

  <!-- Subtitle -->
  <text
    x="450"
    y="188"
    font-family="'Segoe UI', 'Courier New', 'Arial', sans-serif"
    font-size="14"
    font-weight="400"
    text-anchor="middle"
    fill="#4c1d95"
    letter-spacing="3"
  >AI / ML ENGINEER  •  NLP  •  FULL-STACK  •  PATENT FILER</text>

  <!-- Corner tags -->
  <text x="20" y="275" font-family="'Courier New', monospace" font-size="10" fill="#7c3aed" opacity="0.5">&lt;tanishk.ai /&gt;</text>
  <text x="780" y="275" font-family="'Courier New', monospace" font-size="10" fill="#7c3aed" opacity="0.5">India 🇮🇳</text>
</svg>
